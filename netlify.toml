[build]
  command = "npm run build"
  publish = "build"

# Public site URL must appear in sitemap/SEO output — not a secret.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "REACT_APP_SITE_URL"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"

[[headers]]
  for = "/browserconfig.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
