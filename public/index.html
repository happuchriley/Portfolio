<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.colorScheme = 'light';
          } else {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark light" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="author" content="Riley Happuch" />
    <meta name="description" content="Riley Happuch — frontend developer portfolio. React, responsive UI, and performant web applications. Open to remote work and collaborations." />
    <meta name="keywords" content="frontend developer, web developer, React, JavaScript, portfolio, UI, responsive design" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Riley Happuch" />
    <meta property="og:title" content="Riley Happuch — Frontend Developer Portfolio" />
    <meta property="og:description" content="Riley Happuch — frontend developer portfolio. React, responsive UI, and performant web applications." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Riley Happuch — Frontend Developer Portfolio" />
    <meta name="twitter:description" content="Riley Happuch — frontend developer portfolio. React, responsive UI, and performant web applications." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="%PUBLIC_URL%/lib/animate/animate.min.css" rel="stylesheet">

</head>
